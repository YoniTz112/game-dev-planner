<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Dev Planner | Pro</title>
  <style>
    /* ========== ESTÉTICA PREMIUM & DARK MODE ========== */
    :root {
      --bg: #000000;
      --surface: #151516;
      --surface-glass: rgba(28, 28, 30, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      
      --text-primary: #F5F5F7;
      --text-secondary: #86868B;
      
      --accent-yoni: #0A84FF;    /* Azul Tech Premium */
      --accent-schalom: #FF453A; /* Vermelho vibrante */
      --accent-ambos: #BF5AF2;   /* Roxo luxo */
      
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
      --radius-sm: 10px;
      --radius-lg: 18px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      /* Fundo minimalista com leve brilho central */
      background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 60%);
    }
    
    .app { max-width: 1100px; margin: 0 auto; }

    /* ========== GLASSMORPHISM & CONTAINERS ========== */
    .glass {
      background: var(--surface-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }

    /* ========== HEADER ========== */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
    }
    header p { 
      color: var(--text-secondary); 
      margin-top: 8px; 
      font-size: 1.1rem; 
      font-weight: 400;
    }

    /* ========== TABS ========== */
    .tabs {
      display: inline-flex;
      background: var(--surface);
      padding: 4px;
      border-radius: 14px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { 
      background: rgba(255,255,255,0.1); 
      color: var(--text-primary); 
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .tab-content { display: none; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .tab-content.active { display: block; }
    @keyframes fadeUp { 
      from { opacity: 0; transform: translateY(12px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* ========== LAYOUT ========== */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card { padding: 30px; margin-bottom: 24px; }
    .card h2 { font-size: 1.3rem; margin-bottom: 24px; font-weight: 600; letter-spacing: -0.5px; }

    /* ========== FORMS & INPUTS ========== */
    label { 
      display: block; margin-bottom: 8px; 
      color: var(--text-secondary); font-size: 0.85rem; 
      font-weight: 500;
    }
    input, select, textarea {
      width: 100%; padding: 14px 16px; 
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.3); color: var(--text-primary);
      font-size: 0.95rem; transition: all 0.2s ease;
      outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { 
      border-color: rgba(255,255,255,0.3); 
      background: rgba(255,255,255,0.03);
    }
    .form-group { margin-bottom: 20px; }

    /* ========== BOTÕES ========== */
    .btn {
      padding: 14px 24px; border: none; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 0.95rem; font-weight: 600;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
    }
    .btn-primary { 
      background: var(--text-primary); 
      color: var(--bg); 
    }
    .btn-primary:hover { 
      background: #ffffff; 
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(255,255,255,0.15);
    }
    .btn-outline { 
      background: transparent; border: 1px solid var(--border); 
      color: var(--text-primary); width: auto; padding: 10px 16px;
    }
    .btn-outline:hover { 
      background: rgba(255,255,255,0.05); border-color: var(--border-hover);
    }

    /* ========== ATIVIDADES (LISTA 3D EFFECT) ========== */
    .atividade-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* Indicador sutil de responsável */
    .atividade-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .atividade-card.resp-yoni::before { background: var(--accent-yoni); }
    .atividade-card.resp-schalom::before { background: var(--accent-schalom); }
    .atividade-card.resp-ambos::before { background: var(--accent-ambos); }
    
    /* Efeito de elevação (3D) no hover */
    .atividade-card:hover { 
      transform: translateY(-2px) scale(1.01); 
      background: rgba(255,255,255,0.04); 
      border-color: var(--border-hover);
      box-shadow: var(--shadow-sm);
    }
    .atividade-card.concluida { 
      opacity: 0.35; 
      transform: none; 
      box-shadow: none;
      filter: grayscale(100%);
    }
    .atividade-card.concluida .titulo-tarefa { text-decoration: line-through; }
    
    .tag-container { display: flex; gap: 8px; align-items: center; }
    .tag { 
      font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; 
      font-weight: 600; letter-spacing: 0.5px;
    }
    .tag.yoni { background: rgba(10, 132, 255, 0.15); color: var(--accent-yoni); }
    .tag.schalom { background: rgba(255, 69, 58, 0.15); color: var(--accent-schalom); }
    .tag.ambos { background: rgba(191, 90, 242, 0.15); color: var(--accent-ambos); }
    .tag.pri { border: 1px solid var(--border); color: var(--text-secondary); }

    .titulo-tarefa { font-weight: 500; font-size: 1rem; color: var(--text-primary); line-height: 1.4; }
    
    .acao-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .acao-btn:hover { background: rgba(255,255,255,0.1); }

    /* ========== LORE TIMELINE ========== */
    .timeline { position: relative; padding-left: 24px; margin-top: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px;
      background: var(--border);
    }
    .timeline-item { position: relative; margin-bottom: 32px; }
    .timeline-item::before {
      content: ''; position: absolute; left: -28px; top: 6px; width: 8px; height: 8px;
      border-radius: 50%; background: var(--bg); border: 2px solid var(--accent-schalom);
    }
    .lore-content {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }

    /* ========== ROTINA VISUAL ========== */
    .rotina-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-top: 24px; }
    .dia-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; text-align: center;
    }
    .dia-titulo { font-weight: 600; margin-bottom: 12px; font-size: 0.85rem; color: var(--text-secondary); }
    .block {
      padding: 10px 8px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 8px; font-weight: 500;
    }
    .block.yoni { background: rgba(10, 132, 255, 0.1); color: var(--accent-yoni); }
    .block.schalom { background: rgba(255, 69, 58, 0.1); color: var(--accent-schalom); }
    .block.reuniao { background: rgba(191, 90, 242, 0.1); color: var(--accent-ambos); }

    /* Scrollbar minimalista */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Game Dev Planner</h1>
    <p>Unity Workflow • Yoni & Schalom</p>
  </header>

  <div class="tabs glass">
    <button class="tab-btn active" onclick="switchTab('tarefas')">Tarefas & Código</button>
    <button class="tab-btn" onclick="switchTab('lore')">Lore Timeline</button>
    <button class="tab-btn" onclick="switchTab('rotina')">Formular Rotina</button>
  </div>

  <!-- TAB: TAREFAS -->
  <div id="tab-tarefas" class="tab-content active">
    <div class="grid-2">
      <!-- Form Container -->
      <div class="card glass">
        <h2>Nova Tarefa</h2>
        <form id="form-atividade" onsubmit="addAtividade(event)">
          <div class="form-group">
            <label>O que precisa ser feito?</label>
            <input type="text" id="input-titulo" required placeholder="Ex: Refatorar sistema de colisão">
          </div>
          <div class="grid-2" style="gap:16px">
            <div class="form-group">
              <label>Responsável</label>
              <select id="input-responsavel">
                <option value="yoni">Yoni (Tech/Código)</option>
                <option value="schalom">Schalom (Lore/História)</option>
                <option value="ambos">Ambos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Prioridade</label>
              <select id="input-prioridade">
                <option value="alta">Alta (Blocker)</option>
                <option value="media" selected>Média</option>
                <option value="baixa">Baixa (Polimento)</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Adicionar ao Board</button>
        </form>
      </div>

      <!-- Board Container -->
      <div class="card glass" style="display:flex; flex-direction:column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Board de Execução</h2>
          <div style="display:flex; gap:8px;">
            <select id="filtro-responsavel" onchange="renderAtividades()" style="padding:8px 12px; width:auto; border-radius:8px;">
              <option value="todos">Todos</option>
              <option value="yoni">Só Yoni</option>
              <option value="schalom">Só Schalom</option>
            </select>
            <button class="btn-outline" style="border-radius:8px;" onclick="limparConcluidas()">Limpar Feitas</button>
          </div>
        </div>
        <div id="lista-atividades" style="flex:1; overflow-y:auto; max-height:420px; padding-right:10px;">
          <!-- JS injeta as tarefas aqui -->
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: LORE TIMELINE -->
  <div id="tab-lore" class="tab-content">
    <div class="card glass">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
        <h2 style="margin:0;">Linha do Tempo da Lore</h2>
        <button class="btn btn-outline" onclick="addLoreEvent()">+ Novo Evento</button>
      </div>
      <p style="color:var(--text-secondary); margin-bottom:30px;">Schalom, organize os eventos canônicos da história aqui. A ordem visual ajuda a planejar as quests com o código.</p>
      <div class="timeline" id="lore-timeline"></div>
    </div>
  </div>

  <!-- TAB: FORMULAR ROTINA -->
  <div id="tab-rotina" class="tab-content">
    <div class="card glass">
      <h2>Gerador Visual de Rotina</h2>
      <div class="grid-2">
        <div class="form-group">
          <label>Carga Horária Semanal</label>
          <select id="rotina-horas">
            <option value="light">Light (Finais de Semana ~10h)</option>
            <option value="pro" selected>Pro (Noites + FDS ~20h)</option>
            <option value="crunch">Crunch (Quase Full-time ~35h+)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Foco da Sprint</label>
          <select id="rotina-foco">
            <option value="core">Core Gameplay (Mecânicas base)</option>
            <option value="world">Worldbuilding (Mapa e História)</option>
            <option value="polish">Polimento & UI</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="gerarRotinaVisual()">Gerar Cronograma</button>

      <div id="rotina-resultado" style="display:none; margin-top:40px;">
        <h3 style="margin-bottom: 20px; font-weight: 500;">Sua Sprint Sugerida</h3>
        <div class="rotina-grid">
          <div class="dia-card"><div class="dia-titulo">SEG</div><div id="d1"></div></div>
          <div class="dia-card"><div class="dia-titulo">TER</div><div id="d2"></div></div>
          <div class="dia-card"><div class="dia-titulo">QUA</div><div id="d3"></div></div>
          <div class="dia-card"><div class="dia-titulo">QUI</div><div id="d4"></div></div>
          <div class="dia-card"><div class="dia-titulo">SEX</div><div id="d5"></div></div>
          <div class="dia-card" style="background:rgba(255,255,255,0.04);"><div class="dia-titulo" style="color:var(--text-primary)">SÁB</div><div id="d6"></div></div>
          <div class="dia-card" style="background:rgba(255,255,255,0.04);"><div class="dia-titulo" style="color:var(--text-primary)">DOM</div><div id="d7"></div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Inclusão do Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  // ========== CONFIGURAÇÃO SUPABASE ==========
  const SUPABASE_URL = 'https://uhljjblxpeaseiqovwwu.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVobGpqYmx4cGVhc2VpcW92d3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDMzODYsImV4cCI6MjA5NzYxOTM4Nn0.p0vo0IYg9VcWFCjkrJk3CnXZlxA_OG1kzYWhgyVxkHE';
  
  let supabaseClient = null;
  let useLocal = false;
  
  try {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
      throw new Error('Supabase library não carregada');
    }
  } catch (err) {
    console.warn('Rodando em modo LocalStorage (Supabase inacessível).', err);
    useLocal = true;
  }

  // ========== ESTADO GLOBAL ==========
  let tarefas = [];
  let loreEvents = JSON.parse(localStorage.getItem('gamedev_lore') || '[{"id":1,"titulo":"O Início","desc":"O personagem acorda sem memória na floresta de silício."}]');

  window.onload = async () => {
    await carregarTarefas();
    renderLore();
  };

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  }

  // ========== CRUD TAREFAS (SUPABASE + LOCAL FALLBACK) ==========
  
  async function carregarTarefas() {
    if (useLocal) {
      tarefas = JSON.parse(localStorage.getItem('gamedev_tarefas') || '[]');
      renderAtividades();
      return;
    }

    try {
      const { data, error } = await supabaseClient.from('tasks').select('*').order('id', { ascending: false });
      if (error) throw error;
      
      tarefas = data.map(item => ({
        id: item.id,
        titulo: item.title,
        responsavel: item.assigned_to,
        prioridade: item.priority,
        concluida: item.is_completed
      }));
      renderAtividades();
    } catch (err) {
      console.error('Erro ao buscar do Supabase, caindo pro LocalStorage', err);
      useLocal = true;
      carregarTarefas();
    }
  }

  async function addAtividade(e) {
    e.preventDefault();
    const titulo = document.getElementById('input-titulo').value;
    const responsavel = document.getElementById('input-responsavel').value;
    const prioridade = document.getElementById('input-prioridade').value;
    
    document.getElementById('input-titulo').value = '';

    if (useLocal) {
      const novaTarefa = { id: Date.now(), titulo, responsavel, prioridade, concluida: false };
      tarefas.unshift(novaTarefa);
      localStorage.setItem('gamedev_tarefas', JSON.stringify(tarefas));
      renderAtividades();
      return;
    }

    try {
      const payload = { title: titulo, assigned_to: responsavel, priority: prioridade, is_completed: false };
      await supabaseClient.from('tasks').insert([payload]);
      carregarTarefas(); // recarrega a lista real do banco
    } catch (err) {
      console.error(err);
    }
  }

  async function toggleTarefa(id) {
    const t = tarefas.find(x => x.id === id);
    if(!t) return;
    
    if (useLocal) {
      t.concluida = !t.concluida;
      localStorage.setItem('gamedev_tarefas', JSON.stringify(tarefas));
      renderAtividades();
      return;
    }

    try {
      await supabaseClient.from('tasks').update({ is_completed: !t.concluida }).eq('id', id);
      carregarTarefas();
    } catch (err) {
      console.error(err);
    }
  }

  async function limparConcluidas() {
    if (useLocal) {
      tarefas = tarefas.filter(t => !t.concluida);
      localStorage.setItem('gamedev_tarefas', JSON.stringify(tarefas));
      renderAtividades();
      return;
    }

    try {
      const idsParaExcluir = tarefas.filter(t => t.concluida).map(t => t.id);
      if (idsParaExcluir.length > 0) {
        await supabaseClient.from('tasks').delete().in('id', idsParaExcluir);
        carregarTarefas();
      }
    } catch (err) {
      console.error(err);
    }
  }

  function renderAtividades() {
    const lista = document.getElementById('lista-atividades');
    const filtro = document.getElementById('filtro-responsavel').value;
    
    let html = '';
    tarefas.forEach(t => {
      if(filtro !== 'todos' && t.responsavel !== filtro && t.responsavel !== 'ambos') return;
      
      const tagClass = t.responsavel;
      const respNome = t.responsavel.charAt(0).toUpperCase() + t.responsavel.slice(1);
      
      html += `
        <div class="atividade-card resp-${t.responsavel} ${t.concluida ? 'concluida' : ''}">
          <div class="tag-container">
            <span class="tag ${tagClass}">${respNome}</span>
            <span class="tag pri">${t.prioridade.toUpperCase()}</span>
          </div>
          <div class="titulo-tarefa">${t.titulo}</div>
          <button class="acao-btn" onclick="toggleTarefa(${t.id})">
            ${t.concluida ? 'Desfazer' : 'Marcar como Feito'}
          </button>
        </div>
      `;
    });
    lista.innerHTML = html || '<p style="text-align:center; color:var(--text-secondary); padding:30px 0;">Board limpo. GG!</p>';
  }

  // ========== LORE (Mantido em LocalStorage para simplicidade do protótipo) ==========
  function addLoreEvent() {
    const titulo = prompt("Título do Evento (Ex: A Grande Guerra):");
    if(!titulo) return;
    const desc = prompt("Descrição breve do que acontece:");
    if(!desc) return;
    loreEvents.push({ id: Date.now(), titulo, desc });
    localStorage.setItem('gamedev_lore', JSON.stringify(loreEvents));
    renderLore();
  }

  function removerLore(id) {
    if(confirm('Excluir este evento da lore?')) {
      loreEvents = loreEvents.filter(x => x.id !== id);
      localStorage.setItem('gamedev_lore', JSON.stringify(loreEvents));
      renderLore();
    }
  }

  function renderLore() {
    const container = document.getElementById('lore-timeline');
    let html = '';
    loreEvents.forEach((ev, index) => {
      html += `
        <div class="timeline-item">
          <div class="lore-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
              <h3 style="color:var(--text-primary); font-size:1.1rem; font-weight:600;">Capítulo ${index + 1}: ${ev.titulo}</h3>
              <button onclick="removerLore(${ev.id})" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.2rem;">&times;</button>
            </div>
            <p style="font-size:0.95rem; line-height:1.6; color:var(--text-secondary)">${ev.desc}</p>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // ========== ROTINA VISUAL ==========
  function gerarRotinaVisual() {
    document.getElementById('rotina-resultado').style.display = 'block';
    const perfil = document.getElementById('rotina-horas').value;
    
    for(let i=1; i<=7; i++) document.getElementById(`d${i}`).innerHTML = '';
    
    const blockYoni = (texto) => `<div class="block yoni">YONI<br>${texto}</div>`;
    const blockSchalom = (texto) => `<div class="block schalom">SCHA<br>${texto}</div>`;
    const blockAmbos = (texto) => `<div class="block reuniao">PLAYTEST<br>${texto}</div>`;

    if(perfil === 'pro') {
      document.getElementById('d1').innerHTML = blockYoni('Lógica Base') + blockSchalom('Escrever Quests');
      document.getElementById('d2').innerHTML = blockYoni('Sistemas (2h)');
